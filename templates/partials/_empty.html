{{define "empty"}}
<div class="main-widget-header">
    <button id="toggle-sidebar" class="menu-btn" onclick="document.getElementById('homebase-sidebar').classList.toggle('hidden')">
        <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <span class="text-primary font-medium">Homebase</span>
</div>
<div class="flex-1 overflow-y-auto glass-scrollbar" style="padding: 1.5rem;">
    <div style="max-width: 640px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i data-lucide="home" style="width: 48px; height: 48px; color: var(--color-accent); margin: 0 auto 0.75rem; display: block;"></i>
            <h2 style="font-size: 1.25rem; font-weight: 600; color: var(--color-text-primary); margin-bottom: 0.5rem;">Homebase</h2>
            <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">Matter smart home control panel</p>
            <div style="display: flex; gap: 0.5rem; justify-content: center;">
                <button class="btn btn-primary"
                        hx-get="partials/add-form"
                        hx-target="#main-widget-container"
                        hx-swap="innerHTML">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Device
                </button>
            </div>
            <p style="margin-top: 1rem;">
                <a onclick="fetch('/apps/homebase/help?format=html',{headers:typeof getGlobalAuthHeaders==='function'?getGlobalAuthHeaders():{}}).then(r=>r.text()).then(h=>{document.getElementById('main-widget-container').innerHTML=h})"
                   style="color: var(--color-accent); cursor: pointer; font-size: 0.875rem;">
                    <i data-lucide="book-open" style="width: 14px; height: 14px; display: inline; vertical-align: middle; margin-right: 0.25rem;"></i>Documentation
                </a>
            </p>
        </div>
    </div>
</div>
{{end}}
